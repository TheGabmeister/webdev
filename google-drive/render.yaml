services:
  - type: web
    name: google-drive-clone
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npx vite build && npx tsc -p tsconfig.server.json
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: google-drive-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: APP_ORIGIN
        sync: false

databases:
  - name: google-drive-db
    plan: free
    databaseName: google_drive
    user: google_drive_user

crons:
  - name: reconcile-uploads
    runtime: node
    schedule: "*/20 * * * *"
    buildCommand: npm install && npx prisma generate
    startCommand: npx tsx src/server/scripts/reconcile.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: google-drive-db
          property: connectionString
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
