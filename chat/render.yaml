databases:
  - name: chat-db
    plan: free
    databaseName: chat

services:
  - type: web
    name: chat
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: chat-db
          property: connectionString
